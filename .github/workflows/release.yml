name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.1.0)"
        required: true
        default: "1.1.0"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ inputs.version }}"
          } else {
            $tag = "$env:GITHUB_REF" -replace "refs/tags/", ""
            $version = $tag -replace "^v", ""
          }
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "tag=v$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Build borderline.exe
        shell: pwsh
        run: |
          cd Borderline
          dotnet publish `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:Version=${{ steps.version.outputs.version }} `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o ../publish

      - name: Create release manifest
        shell: pwsh
        env:
          VERSION: ${{ steps.version.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          Copy-Item publish/borderline.exe ./borderline.exe
          $sha = (Get-FileHash borderline.exe -Algorithm SHA256).Hash.ToLower()
          $url = "https://github.com/$env:REPO/releases/download/v$env:VERSION/borderline.exe"
          @"
          {
            "version": "$env:VERSION",
            "url": "$url",
            "sha256": "$sha"
          }
          "@ | Set-Content -Encoding utf8 latest.json

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            borderline.exe
            latest.json
